[package]
name = "cross-platform-explorer"
version = "0.2.0"
description = "A cross-platform file explorer with one-click install and auto-updates."
authors = ["you"]
edition = "2021"
rust-version = "1.77.2"

# The library that Tauri's mobile entry point and desktop main.rs both use.
[lib]
name = "app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-opener = "2"
tauri-plugin-process = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# The updater plugin only makes sense on desktop targets.
[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
tauri-plugin-updater = "2"

[features]
# This feature is used for production builds where `devUrl` is disabled.
default = []
