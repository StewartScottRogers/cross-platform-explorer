<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Console</title>
<style>/*__XTERM_CSS__*/</style>
<style>
  :root { color-scheme: light dark; --line: rgba(128,128,128,0.26); --accent: #2f6fed; }
  * { box-sizing: border-box; }
  body { font: 13px system-ui, "Segoe UI", sans-serif; margin: 0; height: 100vh; display: flex;
         flex-direction: column; background: Canvas; color: CanvasText; }

  /* Launcher toolbar */
  .toolbar { padding: 11px 16px; display: flex; flex-direction: column; gap: 10px;
             background: rgba(128,128,128,0.07); border-bottom: 1px solid var(--line); }
  .toolbar .row { display: flex; gap: 14px; align-items: flex-end; }
  .field { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .field.grow { flex: 1; }
  .field label { font-size: 10px; text-transform: uppercase; letter-spacing: .06em;
                 opacity: .55; font-weight: 600; }
  select, input { font: inherit; height: 30px; width: 100%; padding: 0 9px;
                  background: Field; color: FieldText; border: 1px solid var(--line);
                  border-radius: 6px; }
  select:focus, input:focus { outline: none; border-color: var(--accent); }
  button { font: inherit; height: 30px; padding: 0 14px; border-radius: 6px; cursor: pointer;
           border: 1px solid var(--line); background: ButtonFace; color: ButtonText; font-weight: 500; }
  button.primary { height: 34px; min-width: 130px; padding: 0 20px; background: var(--accent);
                   border-color: var(--accent); color: #fff; font-weight: 600; }
  button.primary:hover { filter: brightness(1.08); }
  button:disabled { opacity: .5; cursor: default; }
  .install { display: flex; align-items: center; gap: 8px; height: 30px; }
  .badge { font-size: 10px; padding: 2px 9px; border-radius: 999px; font-weight: 600;
           text-transform: uppercase; letter-spacing: .03em; white-space: nowrap; }
  .badge.no { background: #b5872b; color: #fff; }
  .badge.yes { background: #3a9d4a; color: #fff; }
  #msg { padding: 6px 16px; font-size: 12px; min-height: 20px; border-bottom: 1px solid var(--line);
         opacity: .85; }
  /* Session tabs — one agent per tab (CPE-336) */
  #tabs { display: flex; gap: 2px; padding: 0 10px; overflow-x: auto;
          background: rgba(128,128,128,0.07); border-bottom: 1px solid var(--line); }
  #tabs:empty { display: none; }
  .tab { display: flex; align-items: center; gap: 8px; padding: 7px 10px; font-size: 12px;
         cursor: pointer; border-top: 2px solid transparent; opacity: .62; white-space: nowrap; max-width: 240px; }
  .tab.active { opacity: 1; border-top-color: var(--accent); background: rgba(128,128,128,0.09); }
  .tab.ended .tab-label { text-decoration: line-through; opacity: .6; }
  .tab-label { overflow: hidden; text-overflow: ellipsis; }
  .tab-close { border: 0; background: transparent; color: inherit; cursor: pointer;
               font-size: 15px; line-height: 1; padding: 0 2px; opacity: .55; }
  .tab-close:hover { color: #d05656; opacity: 1; }
  #terms { flex: 1; min-height: 0; position: relative; background: #0d0d0d; }
  .term-pane { position: absolute; inset: 0; }
  /* Each terminal reserves a 14px right gutter for our OWN scrollbar. WebView2 won't
     reliably paint a native scrollbar thumb, so we hide xterm's and draw a real,
     always-visible, draggable thumb synced to xterm's scroll state (CPE-336). */
  .term-host { position: absolute; left: 0; top: 0; bottom: 0; right: 14px; }
  .xterm-viewport { scrollbar-width: none; }
  .xterm-viewport::-webkit-scrollbar { display: none; }
  .sb { position: absolute; right: 0; top: 0; bottom: 0; width: 14px; background: #141414; }
  .sb-thumb { position: absolute; left: 2px; right: 2px; min-height: 26px; background: #6a6a6a;
              border-radius: 5px; cursor: grab; }
  .sb-thumb:hover { background: #8f8f8f; }
  .sb-thumb:active { cursor: grabbing; background: #a5a5a5; }
  /* Provider credential manager (CPE-346) */
  #keys-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); display: grid;
                  place-items: center; z-index: 50; }
  #keys-overlay[hidden] { display: none; }
  #keys-panel { width: 460px; max-width: 92vw; background: Canvas; color: CanvasText;
                border: 1px solid var(--line); border-radius: 10px; padding: 16px;
                box-shadow: 0 20px 50px rgba(0,0,0,.35); }
  .keys-head { display: flex; align-items: center; justify-content: space-between;
               font-weight: 600; font-size: 14px; margin-bottom: 8px; }
  .keys-x { height: 26px; padding: 0 8px; }
  .keys-note { font-size: 11.5px; opacity: .7; line-height: 1.45; margin: 0 0 12px; }
  .keys-form { display: grid; grid-template-columns: 130px 1fr auto auto; gap: 8px; align-items: center; }
  #keys-msg { min-height: 18px; font-size: 12px; margin: 10px 0; }
  .key-row { display: flex; align-items: center; justify-content: space-between;
             padding: 6px 8px; border-top: 1px solid var(--line); font-size: 12.5px; }
  #keys-list:empty { display: none; }
</style>
</head>
<body>
  <div class="toolbar">
    <div class="row">
      <div class="field" style="width:190px;flex:0 0 auto">
        <label for="agent">Agent</label>
        <select id="agent"></select>
      </div>
      <div class="install" id="install-wrap"></div>
      <div class="field" style="width:160px;flex:0 0 auto">
        <label for="provider">Provider</label>
        <select id="provider"></select>
      </div>
      <div class="field grow">
        <label for="model">Model</label>
        <input id="model" placeholder="(default)" />
      </div>
      <div class="field grow">
        <label for="smallModel">Small model</label>
        <input id="smallModel" placeholder="(same as model)" />
      </div>
      <div class="field grow">
        <label for="apiKey">API key</label>
        <input id="apiKey" type="password" placeholder="optional — native login otherwise" />
      </div>
    </div>
    <div class="row">
      <div class="field grow">
        <label for="cwd">Working folder</label>
        <input id="cwd" />
      </div>
      <button id="keys-btn" type="button" title="Manage provider API keys">Keys…</button>
      <button id="launch" class="primary">Launch</button>
    </div>
  </div>
  <div id="msg">Pick an agent, provider and model, then Launch.</div>
  <div id="tabs"></div>
  <div id="terms"></div>

  <!-- Provider credential manager (CPE-346). Values are write-only: saved to the OS
       keychain via the host, never read back into the UI. -->
  <div id="keys-overlay" hidden>
    <div id="keys-panel">
      <div class="keys-head">
        <span>Provider keys</span>
        <button id="keys-close" type="button" class="keys-x" title="Close">×</button>
      </div>
      <p class="keys-note">Stored in your OS keychain and shared by every agent that uses the
        provider. A key is never shown again after it's saved.</p>
      <div class="keys-form">
        <select id="key-provider"></select>
        <input id="key-value" type="password" placeholder="Paste API key" autocomplete="off" spellcheck="false" />
        <button id="key-verify" type="button">Check</button>
        <button id="key-save" type="button" class="primary">Save</button>
      </div>
      <div id="keys-msg"></div>
      <div id="keys-list"></div>
    </div>
  </div>

<script>/*__XTERM_JS__*/</script>
<script>/*__FIT_JS__*/</script>
<script>/*__SEARCH_JS__*/</script>
<script>/*__LINKS_JS__*/</script>
<script>/*__UNICODE_JS__*/</script>
<script>
"use strict";
// Surface any uncaught error to the status bar (the pane has no visible devtools).
window.onerror = function (m) { try { setMsg("Error: " + m, false); } catch (_) {} };
const $ = (id) => document.getElementById(id);
let catalog = null;

async function api(path, opts) {
  const r = await fetch(path, opts);
  const text = await r.text();
  let data = {}; try { data = text ? JSON.parse(text) : {}; } catch (_) {}
  if (!r.ok) throw new Error(data.error || ("HTTP " + r.status));
  return data;
}
function agentById(id) { return catalog.agents.find((a) => a.id === id); }
function setMsg(m, ok) { const el = $("msg"); el.textContent = m || ""; el.style.color = ok ? "#3a9d4a" : "#d05656"; }

function renderProviders() {
  const a = agentById($("agent").value);
  $("provider").innerHTML = "";
  (a ? a.providers : []).forEach((p) => {
    const o = document.createElement("option"); o.value = p; o.textContent = p; $("provider").appendChild(o);
  });
  $("model").placeholder = (a && a.defaultModel) ? a.defaultModel : "(default)";
  renderInstall();
}
function renderInstall() {
  const a = agentById($("agent").value);
  const wrap = $("install-wrap"); wrap.innerHTML = "";
  if (!a) return;
  const badge = document.createElement("span");
  badge.className = "badge " + (a.installed ? "yes" : "no");
  badge.textContent = a.installed ? ("installed" + (a.version ? " " + a.version.split(/\s+/).pop() : "")) : "not installed";
  wrap.appendChild(badge);
  if (!a.installed && a.canInstall) {
    const b = document.createElement("button"); b.textContent = "Install";
    b.onclick = () => install(a.id); wrap.appendChild(b);
  }
}

async function install(id) {
  setMsg("Installing " + id + "…", true);
  try { await api("/api/install", { method: "POST", body: JSON.stringify({ agent: id }) });
        setMsg(id + " installed. Refreshing…", true); await load(); }
  catch (e) { setMsg("Install failed: " + e.message); }
}

async function load() {
  catalog = await api("/api/catalog");
  const sel = $("agent"); const prev = sel.value; sel.innerHTML = "";
  catalog.agents.forEach((a) => {
    const o = document.createElement("option"); o.value = a.id;
    o.textContent = a.name + (a.installed ? "" : " (not installed)"); sel.appendChild(o);
  });
  $("cwd").value = catalog.cwd || "";
  // Explorer "work on this" hand-off (CPE-313): cwd/task passed as query params
  // pre-scope the session. Decoupled — the explorer merely opened this URL.
  const ctx = new URLSearchParams(location.search);
  const ctxCwd = ctx.get("cwd");
  if (ctxCwd) $("cwd").value = ctxCwd;
  const ctxTask = ctx.get("task");
  if (ctxTask) setMsg("From explorer — " + ctxTask + "  (pick agent & provider, then Launch)", true);
  const last = catalog.lastUsed;
  if (last && agentById(last.agent)) { sel.value = last.agent; } else if (prev) { sel.value = prev; }
  renderProviders();
  if (last) { if (last.provider) $("provider").value = last.provider; if (last.model) $("model").value = last.model; }
}

// --- Sessions as tabs (xterm.js over WebSocket, one agent per tab; CPE-336) -----------
// Each Launch spawns an independent agent session on the sidecar (its own PTY) and adds a
// tab; switching tabs shows that session's terminal. The sidecar runs them all at once.
const sessions = new Map(); // id -> { id, name, term, fit, search, ws, pane, tab }
let activeId = null;

function buildTerm(s) {
  const term = new Terminal({
    fontFamily: "ui-monospace, Consolas, 'Cascadia Mono', monospace",
    fontSize: 13, cursorBlink: true, scrollback: 50000,
    theme: { background: "#0d0d0d", foreground: "#d8d8d8" },
  });
  const fit = new FitAddon.FitAddon();
  term.loadAddon(fit);
  let search = null;
  try { search = new SearchAddon.SearchAddon(); term.loadAddon(search); } catch (_) {}
  try { term.loadAddon(new WebLinksAddon.WebLinksAddon()); } catch (_) {}
  try { term.loadAddon(new Unicode11Addon.Unicode11Addon()); term.unicode.activeVersion = "11"; } catch (_) {}
  term.open(s.host);
  fit.fit();
  term.onData((d) => { if (s.ws && s.ws.readyState === 1) s.ws.send(d); });
  term.attachCustomKeyEventHandler((e) => onKey(e, s));
  term.onScroll(() => updateThumb(s));
  if (window.ResizeObserver) new ResizeObserver(() => { if (s.id === activeId) refit(s); }).observe(s.pane);
  s.term = term; s.fit = fit; s.search = search;
}

function refit(s) {
  try { s.fit.fit(); } catch (_) {}
  sendResize(s);
  updateThumb(s);
}

function activate(id) {
  activeId = id;
  for (const s of sessions.values()) {
    const on = s.id === id;
    s.pane.style.display = on ? "block" : "none";
    s.tab.classList.toggle("active", on);
    if (on) { refit(s); s.term.focus(); }
  }
}

// --- Custom scrollbar (WebView2 won't reliably paint a native one) ---------------------
function updateThumb(s) {
  if (!s.term) return;
  const b = s.term.buffer.active;
  const trackH = s.sb.clientHeight;
  const total = b.baseY + s.term.rows;
  // Nothing to scroll. This also correctly hides the thumb under a full-screen TUI agent
  // (e.g. Claude Code): those switch to the ALTERNATE screen buffer, which has no scrollback,
  // so baseY stays 0 and the agent owns its own scrolling via mouse tracking. See CPE-337.
  if (b.baseY <= 0 || trackH <= 0) { s.thumb.style.display = "none"; return; }
  s.thumb.style.display = "block";
  const thumbH = Math.max(26, Math.round((trackH * s.term.rows) / total));
  const top = Math.round((b.viewportY / b.baseY) * (trackH - thumbH));
  s.thumb.style.height = thumbH + "px";
  s.thumb.style.top = top + "px";
}
function scheduleThumb(s) {
  if (s._pend) return;
  s._pend = true;
  requestAnimationFrame(() => { s._pend = false; updateThumb(s); });
}
function wireScrollbar(s) {
  s.thumb.addEventListener("mousedown", (e) => {
    e.preventDefault();
    const startY = e.clientY, startTop = parseFloat(s.thumb.style.top) || 0;
    const trackH = s.sb.clientHeight, thumbH = s.thumb.offsetHeight, span = (trackH - thumbH) || 1;
    const move = (ev) => {
      const b = s.term.buffer.active;
      const top = Math.max(0, Math.min(span, startTop + (ev.clientY - startY)));
      s.term.scrollToLine(Math.round((top / span) * b.baseY));
    };
    const up = () => { window.removeEventListener("mousemove", move); window.removeEventListener("mouseup", up); };
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
  });
  s.sb.addEventListener("mousedown", (e) => {
    if (e.target === s.thumb) return; // click on track = page toward the cursor
    const b = s.term.buffer.active;
    s.term.scrollToLine(Math.round((e.offsetY / (s.sb.clientHeight || 1)) * b.baseY));
  });
}

function connectWs(s) {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  s.ws = new WebSocket(proto + "://" + location.host + "/api/session/" + s.id + "/ws");
  s.ws.binaryType = "arraybuffer";
  s.ws.onmessage = (e) => {
    if (typeof e.data === "string") s.term.write(e.data);
    else s.term.write(new Uint8Array(e.data));
    scheduleThumb(s); // content grew — resize/reposition the thumb
  };
  s.ws.onopen = () => refit(s);
  s.ws.onclose = () => s.tab.classList.add("ended");
}

function addSession(id, name) {
  const pane = document.createElement("div"); pane.className = "term-pane";
  const host = document.createElement("div"); host.className = "term-host";
  const sb = document.createElement("div"); sb.className = "sb";
  const thumb = document.createElement("div"); thumb.className = "sb-thumb";
  sb.appendChild(thumb); pane.appendChild(host); pane.appendChild(sb);
  $("terms").appendChild(pane);
  const tab = document.createElement("div"); tab.className = "tab";
  const lbl = document.createElement("span"); lbl.className = "tab-label"; lbl.textContent = name;
  const x = document.createElement("button"); x.className = "tab-close"; x.title = "Close session"; x.textContent = "×";
  tab.appendChild(lbl); tab.appendChild(x);
  $("tabs").appendChild(tab);
  const s = { id, name, term: null, fit: null, search: null, ws: null, pane, host, sb, thumb, tab };
  sessions.set(id, s);
  tab.onclick = (e) => { if (e.target !== x) activate(id); };
  x.onclick = (e) => { e.stopPropagation(); closeSession(id); };
  buildTerm(s);
  wireScrollbar(s);
  connectWs(s);
  activate(id);
}

function closeSession(id) {
  const s = sessions.get(id); if (!s) return;
  try { if (s.ws) s.ws.close(); } catch (_) {}
  try { if (s.term) s.term.dispose(); } catch (_) {}
  s.pane.remove(); s.tab.remove();
  sessions.delete(id);
  if (activeId === id) { const next = sessions.keys().next().value; if (next) activate(next); else activeId = null; }
}

// Ctrl+Shift+C/V copy-paste, Ctrl+F find on the given session. false = don't send the key on.
function onKey(e, s) {
  if (e.type !== "keydown") return true;
  const k = e.key.toLowerCase();
  if (e.ctrlKey && e.shiftKey && k === "c") { const sel = s.term.getSelection(); if (sel) navigator.clipboard.writeText(sel).catch(() => {}); return false; }
  if (e.ctrlKey && e.shiftKey && k === "v") { navigator.clipboard.readText().then((t) => { if (s.ws && s.ws.readyState === 1) s.ws.send(t); }).catch(() => {}); return false; }
  if (e.ctrlKey && k === "f") { const q = window.prompt("Find in terminal:"); if (q && s.search) s.search.findNext(q); return false; }
  return true;
}

async function sendResize(s) {
  if (!s || !s.term) return;
  try {
    await fetch("/api/session/" + s.id + "/resize",
      { method: "POST", body: JSON.stringify({ rows: s.term.rows, cols: s.term.cols }) });
  } catch (_) {}
}

async function launch() {
  const a = agentById($("agent").value);
  // Fall back to the agent's default model when the field is blank; a provider that needs
  // a "small/fast" model reuses the main model unless one is given. Exception: the local
  // LM Studio provider leaves a blank model blank on purpose, so the backend adopts the
  // endpoint's actually-loaded model instead of the vendor default (CPE-330).
  const isLmStudio = $("provider").value === "lmstudio-local";
  const model = $("model").value.trim() || (isLmStudio ? "" : ((a && a.defaultModel) || ""));
  const smallModel = $("smallModel").value.trim() || model;
  const body = {
    agent: $("agent").value, provider: $("provider").value,
    model, smallModel, apiKey: $("apiKey").value,
    cwd: $("cwd").value.trim(),
  };
  setMsg("Launching…", true);
  try {
    const res = await api("/api/launch", { method: "POST", body: JSON.stringify(body) });
    // Per-session tab title: agent · provider · model, so concurrent sessions are
    // told apart at a glance (CPE-290). Model is omitted when blank (e.g. the LM
    // Studio provider, where the loaded model is only known after detection).
    const name = (a ? a.name : $("agent").value) + " · " + $("provider").value
      + (model ? " · " + model : "");
    addSession(res.session, name);
    if (res.dangerousFlags && res.dangerousFlags.length)
      setMsg("Launched with elevated flags: " + res.dangerousFlags.join(", "), false);
    else setMsg("Session running — type in the terminal. Launch again for another tab. Ctrl+Shift+C/V, Ctrl+F.", true);
  } catch (e) { setMsg("Launch failed: " + e.message); }
}

// --- Provider credential manager (CPE-346) --------------------------------------------
function keysMsg(m, ok) { const e = $("keys-msg"); e.textContent = m || ""; e.style.color = ok ? "#3a9d4a" : "#d05656"; }
function allProviders() {
  const set = new Set();
  ((catalog && catalog.agents) || []).forEach((a) => (a.providers || []).forEach((p) => set.add(p)));
  return [...set].sort();
}
async function openKeys() {
  const sel = $("key-provider"); sel.innerHTML = "";
  allProviders().forEach((p) => { const o = document.createElement("option"); o.value = p; o.textContent = p; sel.appendChild(o); });
  $("key-value").value = ""; keysMsg("");
  $("keys-overlay").hidden = false;
  await refreshKeys();
}
async function refreshKeys() {
  const list = $("keys-list"); list.innerHTML = "";
  try {
    const data = await api("/api/keys");
    const providers = data.providers || [];
    if (!providers.length) { list.textContent = "No keys stored yet."; return; }
    providers.forEach((p) => {
      const row = document.createElement("div"); row.className = "key-row";
      const name = document.createElement("span"); name.textContent = p + " — saved";
      const rm = document.createElement("button"); rm.type = "button"; rm.textContent = "Remove";
      rm.onclick = () => removeKey(p);
      row.appendChild(name); row.appendChild(rm); list.appendChild(row);
    });
  } catch (e) { list.textContent = "Couldn't load keys: " + e.message; }
}
async function verifyKey() {
  try {
    const r = await api("/api/keys/verify", { method: "POST", body: JSON.stringify({ provider: $("key-provider").value, key: $("key-value").value }) });
    keysMsg((r.valid ? "Format looks valid" : "Won't save: " + r.detail) + (r.live ? "" : " (offline check)"), r.valid);
  } catch (e) { keysMsg("Check failed: " + e.message); }
}
async function saveKey() {
  try {
    await api("/api/keys", { method: "POST", body: JSON.stringify({ provider: $("key-provider").value, key: $("key-value").value }) });
    $("key-value").value = ""; // never keep the value around
    keysMsg("Saved " + $("key-provider").value + " key.", true);
    await refreshKeys();
  } catch (e) { keysMsg("Save failed: " + e.message); }
}
async function removeKey(provider) {
  try {
    await api("/api/keys/delete", { method: "POST", body: JSON.stringify({ provider }) });
    keysMsg("Removed " + provider + " key.", true);
    await refreshKeys();
  } catch (e) { keysMsg("Remove failed: " + e.message); }
}
$("keys-btn").addEventListener("click", openKeys);
$("keys-close").addEventListener("click", () => ($("keys-overlay").hidden = true));
$("key-verify").addEventListener("click", verifyKey);
$("key-save").addEventListener("click", saveKey);
$("keys-overlay").addEventListener("click", (e) => { if (e.target === $("keys-overlay")) $("keys-overlay").hidden = true; });

$("agent").addEventListener("change", renderProviders);
$("launch").addEventListener("click", launch);
load().catch((e) => setMsg("Could not load catalog: " + e.message));
</script>
</body>
</html>
