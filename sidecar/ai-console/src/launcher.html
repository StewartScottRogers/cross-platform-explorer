<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Console</title>
<style>/*__XTERM_CSS__*/</style>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { font: 13px system-ui, sans-serif; margin: 0; height: 100vh; display: flex;
         flex-direction: column; background: Canvas; color: CanvasText; }
  header { padding: 8px 12px; border-bottom: 1px solid rgba(128,128,128,0.3);
           display: flex; flex-wrap: wrap; gap: 8px; align-items: end; }
  .field { display: flex; flex-direction: column; gap: 2px; }
  .field label { font-size: 10px; text-transform: uppercase; letter-spacing: .04em; opacity: .6; }
  select, input { font: inherit; padding: 4px 6px; background: Field; color: FieldText;
                  border: 1px solid rgba(128,128,128,0.4); border-radius: 5px; }
  input.grow { min-width: 180px; }
  button { font: inherit; padding: 5px 12px; border-radius: 6px; cursor: pointer;
           border: 1px solid rgba(128,128,128,0.4); background: ButtonFace; color: ButtonText; }
  button.primary { background: #2f6fed; border-color: #2f6fed; color: #fff; }
  button:disabled { opacity: .5; cursor: default; }
  .spacer { flex: 1; }
  .badge { font-size: 10px; padding: 1px 6px; border-radius: 999px; }
  .badge.no { background: #b5872b; color: #fff; }
  .badge.yes { background: #3a9d4a; color: #fff; }
  #msg { padding: 4px 12px; font-size: 12px; color: #d05656; min-height: 18px; }
  #term { flex: 1; min-height: 0; padding: 6px 8px; background: #0d0d0d; overflow: hidden; }
  #term .xterm, #term .xterm-viewport { height: 100% !important; }
</style>
</head>
<body>
  <header>
    <div class="field">
      <label for="agent">Agent</label>
      <select id="agent"></select>
    </div>
    <div class="field">
      <label for="provider">Provider</label>
      <select id="provider"></select>
    </div>
    <div class="field">
      <label for="model">Model</label>
      <input id="model" class="grow" placeholder="(default)" />
    </div>
    <div class="field">
      <label for="smallModel">Small model (optional)</label>
      <input id="smallModel" class="grow" placeholder="(same as model)" />
    </div>
    <div class="field">
      <label for="apiKey">API key (optional)</label>
      <input id="apiKey" type="password" placeholder="from profile / native login" />
    </div>
    <div class="field" style="flex:1;min-width:220px">
      <label for="cwd">Working folder</label>
      <input id="cwd" class="grow" style="width:100%" />
    </div>
    <span id="install-wrap"></span>
    <button id="launch" class="primary">Launch</button>
  </header>
  <div id="msg">Pick an agent, provider and model, then Launch.</div>
  <div id="term"></div>

<script>/*__XTERM_JS__*/</script>
<script>/*__FIT_JS__*/</script>
<script>/*__WEBGL_JS__*/</script>
<script>/*__SEARCH_JS__*/</script>
<script>/*__LINKS_JS__*/</script>
<script>/*__UNICODE_JS__*/</script>
<script>
"use strict";
const $ = (id) => document.getElementById(id);
let catalog = null;
let session = null;

async function api(path, opts) {
  const r = await fetch(path, opts);
  const text = await r.text();
  let data = {}; try { data = text ? JSON.parse(text) : {}; } catch (_) {}
  if (!r.ok) throw new Error(data.error || ("HTTP " + r.status));
  return data;
}
function agentById(id) { return catalog.agents.find((a) => a.id === id); }
function setMsg(m, ok) { const el = $("msg"); el.textContent = m || ""; el.style.color = ok ? "#3a9d4a" : "#d05656"; }

function renderProviders() {
  const a = agentById($("agent").value);
  $("provider").innerHTML = "";
  (a ? a.providers : []).forEach((p) => {
    const o = document.createElement("option"); o.value = p; o.textContent = p; $("provider").appendChild(o);
  });
  $("model").placeholder = (a && a.defaultModel) ? a.defaultModel : "(default)";
  renderInstall();
}
function renderInstall() {
  const a = agentById($("agent").value);
  const wrap = $("install-wrap"); wrap.innerHTML = "";
  if (!a) return;
  const badge = document.createElement("span");
  badge.className = "badge " + (a.installed ? "yes" : "no");
  badge.textContent = a.installed ? ("installed" + (a.version ? " " + a.version.split(/\s+/).pop() : "")) : "not installed";
  wrap.appendChild(badge);
  if (!a.installed && a.canInstall) {
    const b = document.createElement("button"); b.textContent = "Install";
    b.onclick = () => install(a.id); wrap.appendChild(b);
  }
}

async function install(id) {
  setMsg("Installing " + id + "…", true);
  try { await api("/api/install", { method: "POST", body: JSON.stringify({ agent: id }) });
        setMsg(id + " installed. Refreshing…", true); await load(); }
  catch (e) { setMsg("Install failed: " + e.message); }
}

async function load() {
  catalog = await api("/api/catalog");
  const sel = $("agent"); const prev = sel.value; sel.innerHTML = "";
  catalog.agents.forEach((a) => {
    const o = document.createElement("option"); o.value = a.id;
    o.textContent = a.name + (a.installed ? "" : " (not installed)"); sel.appendChild(o);
  });
  $("cwd").value = catalog.cwd || "";
  const last = catalog.lastUsed;
  if (last && agentById(last.agent)) { sel.value = last.agent; } else if (prev) { sel.value = prev; }
  renderProviders();
  if (last) { if (last.provider) $("provider").value = last.provider; if (last.model) $("model").value = last.model; }
}

// --- Terminal (xterm.js over a WebSocket) ---------------------------------------------
let term = null, fitAddon = null, searchAddon = null, ws = null;

function initTerm() {
  if (term) return;
  term = new Terminal({
    fontFamily: "ui-monospace, Consolas, 'Cascadia Mono', monospace",
    fontSize: 13, cursorBlink: true, scrollback: 50000,
    theme: { background: "#0d0d0d", foreground: "#d8d8d8" },
  });
  fitAddon = new FitAddon.FitAddon();
  searchAddon = new SearchAddon.SearchAddon();
  term.loadAddon(fitAddon);
  term.loadAddon(searchAddon);
  term.loadAddon(new WebLinksAddon.WebLinksAddon());
  term.loadAddon(new Unicode11Addon.Unicode11Addon());
  term.unicode.activeVersion = "11";
  term.open($("term"));
  // GPU renderer for lively scrolling of long sessions; fall back to DOM if unavailable.
  try { term.loadAddon(new WebglAddon.WebglAddon()); } catch (_) {}
  fitAddon.fit();
  term.onData((d) => { if (ws && ws.readyState === 1) ws.send(d); });   // keystrokes -> PTY
  term.attachCustomKeyEventHandler(onKey);
  window.addEventListener("resize", refit);
}

function refit() {
  if (!term || !fitAddon) return;
  try { fitAddon.fit(); } catch (_) {}
  if (session) sendResize(term.rows, term.cols);
}

// Ctrl+Shift+C/V copy-paste, Ctrl+F find. Returning false stops xterm passing the key on.
function onKey(e) {
  if (e.type !== "keydown") return true;
  const k = e.key.toLowerCase();
  if (e.ctrlKey && e.shiftKey && k === "c") {
    const sel = term.getSelection();
    if (sel) navigator.clipboard.writeText(sel).catch(() => {});
    return false;
  }
  if (e.ctrlKey && e.shiftKey && k === "v") {
    navigator.clipboard.readText().then((t) => { if (ws && ws.readyState === 1) ws.send(t); }).catch(() => {});
    return false;
  }
  if (e.ctrlKey && k === "f") {
    const q = window.prompt("Find in terminal:");
    if (q) searchAddon.findNext(q);
    return false;
  }
  return true;
}

function connectWs() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(proto + "://" + location.host + "/api/session/" + session + "/ws");
  ws.binaryType = "arraybuffer";
  ws.onmessage = (e) => {
    if (typeof e.data === "string") term.write(e.data);
    else term.write(new Uint8Array(e.data));
  };
  ws.onopen = () => refit();
  ws.onclose = () => setMsg("Session ended.", false);
}

async function launch() {
  const a = agentById($("agent").value);
  // Fall back to the agent's default model when the field is blank; a provider that needs
  // a "small/fast" model reuses the main model unless one is given.
  const model = $("model").value.trim() || (a && a.defaultModel) || "";
  const smallModel = $("smallModel").value.trim() || model;
  const body = {
    agent: $("agent").value, provider: $("provider").value,
    model, smallModel, apiKey: $("apiKey").value,
    cwd: $("cwd").value.trim(),
  };
  setMsg("Launching…", true);
  try {
    const res = await api("/api/launch", { method: "POST", body: JSON.stringify(body) });
    session = res.session;
    initTerm(); term.reset(); term.focus();
    if (ws) { try { ws.close(); } catch (_) {} }
    connectWs();
    if (res.dangerousFlags && res.dangerousFlags.length)
      setMsg("Launched with elevated flags: " + res.dangerousFlags.join(", "), false);
    else setMsg("Session running — type here. Ctrl+Shift+C/V copy-paste, Ctrl+F find.", true);
  } catch (e) { setMsg("Launch failed: " + e.message); }
}

async function sendResize(rows, cols) {
  if (!session) return;
  try {
    await fetch("/api/session/" + session + "/resize",
      { method: "POST", body: JSON.stringify({ rows, cols }) });
  } catch (_) {}
}

$("agent").addEventListener("change", renderProviders);
$("launch").addEventListener("click", launch);
load().catch((e) => setMsg("Could not load catalog: " + e.message));
</script>
</body>
</html>
