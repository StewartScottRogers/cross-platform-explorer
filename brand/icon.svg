<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Cross-Platform Explorer">
  <title>Cross-Platform Explorer app icon</title>
  <defs>
    <linearGradient id="cpe-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <radialGradient id="cpe-glow" cx="0.30" cy="0.24" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.34"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- App tile -->
  <rect width="1024" height="1024" rx="224" fill="url(#cpe-bg)"/>
  <rect width="1024" height="1024" rx="224" fill="url(#cpe-glow)"/>

  <!-- Orbital "watch" ring (Agent Watch) -->
  <circle cx="512" cy="512" r="352" fill="none" stroke="#ffffff" stroke-opacity="0.26" stroke-width="16"/>

  <!-- Compass sparkle (Explore) — a four-point star with concave arms -->
  <path d="M512 152 Q512 512 872 512 Q512 512 512 872 Q512 512 152 512 Q512 512 512 152 Z" fill="#ffffff"/>

  <!-- Aperture / eye at the compass centre (Watch) -->
  <circle cx="512" cy="512" r="92" fill="url(#cpe-bg)"/>
  <circle cx="512" cy="512" r="34" fill="#ffffff"/>

  <!-- The watched agent, on the ring -->
  <circle cx="761" cy="263" r="30" fill="#06B6D4" stroke="#ffffff" stroke-width="10"/>
</svg>
