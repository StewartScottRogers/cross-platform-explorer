<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" role="img" aria-label="Cross-Platform Explorer">
  <title>Cross-Platform Explorer logo</title>
  <defs>
    <linearGradient id="cpe-bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Mark (same geometry as the app icon, scaled into a 200px tile) -->
  <g transform="translate(10,10) scale(0.1953)">
    <rect width="1024" height="1024" rx="224" fill="url(#cpe-bg2)"/>
    <circle cx="512" cy="512" r="352" fill="none" stroke="#ffffff" stroke-opacity="0.26" stroke-width="16"/>
    <path d="M512 152 Q512 512 872 512 Q512 512 512 872 Q512 512 152 512 Q512 512 512 152 Z" fill="#ffffff"/>
    <circle cx="512" cy="512" r="92" fill="url(#cpe-bg2)"/>
    <circle cx="512" cy="512" r="34" fill="#ffffff"/>
    <circle cx="761" cy="263" r="30" fill="#06B6D4" stroke="#ffffff" stroke-width="10"/>
  </g>

  <!-- Wordmark. Uses a generic system sans (not embedded/redistributed); outline for print. -->
  <text x="238" y="103" font-family="Segoe UI, system-ui, Arial, sans-serif" font-size="62" font-weight="700" fill="#0B1020">Cross-Platform</text>
  <text x="238" y="171" font-family="Segoe UI, system-ui, Arial, sans-serif" font-size="62" font-weight="400" fill="#4F46E5" letter-spacing="6">EXPLORER</text>
</svg>
