<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Cross-Platform Explorer mark">
  <title>Cross-Platform Explorer monochrome mark</title>
  <!-- Single-colour mark for stamps, favicons, watermarks. Uses currentColor so it inherits the
       surrounding text colour; set `color:` on the parent (or fill on the <svg>). -->
  <g fill="currentColor">
    <path d="M512 152 Q512 512 872 512 Q512 512 512 872 Q512 512 152 512 Q512 512 512 152 Z"/>
    <circle cx="512" cy="512" r="352" fill="none" stroke="currentColor" stroke-opacity="0.5" stroke-width="18"/>
    <circle cx="761" cy="263" r="30"/>
  </g>
  <circle cx="512" cy="512" r="92" fill="#ffffff"/>
  <circle cx="512" cy="512" r="30" fill="currentColor"/>
</svg>
