name: Release

# Build signed installers for every OS and publish a GitHub Release
# (plus the updater's latest.json) whenever you push a version tag.
#
#   git tag v0.1.0 && git push origin v0.1.0
#
on:
  push:
    tags:
      - "v*"

# Needed so the workflow can create the GitHub Release.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS (Apple Silicon + Intel via universal target)
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS needs both arches for the universal build.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — generate with `npm run tauri signer generate`
          # and store the outputs as repository secrets.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # --- OS code signing — see CPE-002 (currently Blocked on certificates) ---
          #
          # Leave these commented until the certificates actually exist. Setting them
          # to empty secrets makes the signing step fail rather than skip, which would
          # break a currently-working release build.
          #
          # macOS (requires Apple Developer Program membership):
          #   APPLE_CERTIFICATE           — base64 of the .p12 Developer ID cert
          #   APPLE_CERTIFICATE_PASSWORD  — password for that .p12
          #   APPLE_SIGNING_IDENTITY      — e.g. "Developer ID Application: Name (TEAMID)"
          #   APPLE_ID / APPLE_PASSWORD   — Apple ID + app-specific password (notarization)
          #   APPLE_TEAM_ID               — 10-char team ID
          #
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          #
          # Windows (requires an OV or EV Authenticode certificate):
          #   Windows signing is configured in src-tauri/tauri.conf.json under
          #   bundle.windows (certificateThumbprint + digestAlgorithm + timestampUrl),
          #   with the cert installed on the runner — NOT via env vars here.
          #   EV certs are typically hardware/HSM-bound, which usually means a
          #   cloud-signing service or a self-hosted runner.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Cross-Platform Explorer ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          # Emit the updater manifest consumed by tauri.conf.json endpoints.
          includeUpdaterJson: true

  # Sign + publish the agent-catalog bundle next to the installer (CPE-377/308), so the AI Console
  # can refresh its agent roster without an app release. Runs once, after the installers. Guarded by
  # the signing-key secret so it SKIPS (never fails) on repos that haven't set up catalog signing —
  # exactly like the OS-code-signing pattern above.
  catalog:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect catalog signing key
        id: k
        env:
          KEY: ${{ secrets.CPE_CATALOG_SIGNING_KEY }}
        run: |
          if [ -n "$KEY" ]; then echo "has=true" >> "$GITHUB_OUTPUT"; else echo "has=false" >> "$GITHUB_OUTPUT"; fi

      - name: Install Rust toolchain
        if: steps.k.outputs.has == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Build + sign the catalog bundle
        if: steps.k.outputs.has == 'true'
        env:
          # A 32-byte ed25519 seed (hex). Generate once; its public key goes in CATALOG_TRUSTED_KEYS.
          CPE_CATALOG_SIGNING_KEY: ${{ secrets.CPE_CATALOG_SIGNING_KEY }}
        run: |
          VERSION=$(date +%s)   # monotonic across releases → anti-rollback (CPE-372)
          cargo run --release --quiet --manifest-path sidecar/host/Cargo.toml --bin catalog-sign -- \
            sidecar/ai-console/agents catalog-out "$VERSION"

      - name: Upload catalog assets to the release
        if: steps.k.outputs.has == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" catalog-out/* --clobber
