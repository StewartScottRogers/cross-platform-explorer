name: CI

# Fast checks on every push and PR to main: type-check the frontend and run unit tests.
# The full cross-platform Tauri build runs separately in release.yml on version tags.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type-check and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check (svelte-check + tsc)
        run: npm run check

      - name: Unit tests
        run: npm test
