name: CI

# Fast checks on every push and PR to main: type-check + test the frontend, and
# compile + lint + test the Rust backend. The full cross-platform bundle runs
# separately in release.yml on version tags.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — type-check and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check (svelte-check + tsc)
        run: npm run check

      - name: Unit tests
        run: npm test

  backend:
    # Compile on every OS we actually SHIP. Linux alone never compiles
    # `#[cfg(windows)]` code or Windows-only deps (the registry crate), and
    # neither Linux nor Windows catches macOS-only breakage — yet release.yml
    # builds a macOS bundle. Anything not compiled here only fails after a tag
    # is pushed. See CPE-028 (Windows) and CPE-042 (macOS).
    name: Backend (${{ matrix.os }}) — cargo check, clippy, test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # tauri_build needs the frontend dist/ to exist at compile time.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Build frontend (needed by tauri build script)
        run: |
          npm ci
          npm run build

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --all-targets

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        working-directory: src-tauri
        run: cargo test

      # The default build above is the delete-test: the explorer compiles with ZERO
      # sidecar code. This proves the opt-in integration also compiles (CPE-272).
      - name: cargo check (sidecar-platform feature)
        working-directory: src-tauri
        run: cargo clippy --all-targets --features sidecar-platform -- -D warnings

  crates:
    # The GUI↔Server "server-side" crates under crates/ (the Decoupled Server epic CPE-810):
    # cpe-contract (the wire contract, CPE-811) and cpe-security (the pluggable security core,
    # CPE-816). Standalone and Tauri-free — deliberately NOT in the app's cargo workspace, so
    # the `backend` job above doesn't cover them. `src-tauri` will `path`-depend on them later
    # (CPE-815), mirroring `sidecar/contract`. Pure Rust with no platform-specific code, but we
    # lint+test on every shipped OS to match the rest of the Rust matrix.
    name: Server crates (${{ matrix.os }}) — clippy + test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./crates/contract -> target
            ./crates/security -> target

      - name: contract — clippy + test
        working-directory: crates/contract
        run: |
          cargo clippy --all-targets -- -D warnings
          cargo test

      - name: security — clippy + test
        working-directory: crates/security
        run: |
          cargo clippy --all-targets -- -D warnings
          cargo test

  sidecar:
    # The sidecar platform crates (sidecar/contract, sidecar/host) are standalone —
    # deliberately NOT part of the app's cargo workspace, so the `backend` job above
    # doesn't cover them. Build, lint, and test them on every OS we ship, so
    # `#[cfg(windows)]` code (the keychain backend) and the real-process E2E tests are
    # validated cross-platform (CPE-302; first half of the CPE-272 delete-test guard —
    # the app CI here never references the sidecar crates, proving the one-way boundary).
    name: Sidecar platform (${{ matrix.os }}) — clippy + test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      # One-way dependency guard (ADR 0001 / CPE-272): a sidecar crate must NEVER
      # depend on the explorer app. Fail if any sidecar Cargo.toml references it.
      - name: Enforce one-way dependency
        shell: bash
        run: |
          if grep -rE '^(app_lib|cross-platform-explorer)\b|path = "\.\./\.\./src-tauri' sidecar/*/Cargo.toml; then
            echo "::error::a sidecar crate depends on the explorer app — that breaks the one-way boundary"
            exit 1
          fi
          echo "one-way dependency holds"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # The Linux Secret Service keyring backend (CPE-322) links libdbus.
      - name: Install Linux system dependencies (libdbus for the keyring)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./sidecar/contract -> target
            ./sidecar/host -> target
            ./sidecar/ai-console -> target
            ./sidecar/repos -> target

      - name: contract — clippy + test
        working-directory: sidecar/contract
        run: |
          cargo clippy --all-targets -- -D warnings
          cargo test

      - name: host — clippy + test
        working-directory: sidecar/host
        run: |
          cargo clippy --all-targets -- -D warnings
          cargo test

      # CPE-322: verify a REAL OS-keychain round-trip on each runner (Windows Credential Manager /
      # macOS Keychain / Linux Secret Service) — the hardware verification the ticket needs, run on
      # GitHub's macOS + Linux hosts. The test is `#[ignore]`d so the normal run never touches the
      # keychain; here we run it explicitly. Linux needs an unlocked gnome-keyring in a D-Bus session.
      # Best-effort (continue-on-error): a CI keychain quirk must never red the pipeline — a green run
      # is the signal.
      - name: host — real keychain round-trip (CPE-322)
        working-directory: sidecar/host
        continue-on-error: true
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get install -y gnome-keyring
            dbus-run-session -- bash -c '
              eval "$(printf "\n" | gnome-keyring-daemon --unlock --components=secrets)"
              cargo test --test keyring_roundtrip -- --ignored --nocapture
            '
          else
            cargo test --test keyring_roundtrip -- --ignored --nocapture
          fi

      - name: ai-console — clippy + test
        working-directory: sidecar/ai-console
        run: |
          cargo clippy --all-targets -- -D warnings
          cargo test

      - name: repos — clippy + test
        working-directory: sidecar/repos
        run: |
          cargo clippy --all-targets -- -D warnings
          cargo test
