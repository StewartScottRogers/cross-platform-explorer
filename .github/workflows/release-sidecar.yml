name: Release (sidecar-enabled)

# Opt-in channel that builds the app WITH the sidecar platform + AI Console bundled in
# (CPE-321/382). Separate from release.yml on purpose: the public release ships the plain,
# sidecar-free explorer by default; this channel is a manual, draft-only preview of the
# sidecar-enabled build while the console matures (security sign-off CPE-304 open).
#
# Run it from the Actions tab ("Run workflow") and provide the release tag, e.g.
# v0.11.0-sidecar. It publishes a DRAFT prerelease you review before making public.
#
# The overlay gives this build a distinct product identity — "Cross-Platform Explorer
# (Sidecar)" / identifier ...crossplatformexplorer.sidecar (CPE-324) — so its installer is
# a separate app that coexists with the plain release instead of colliding on version.
#
# Cross-OS (CPE-382): builds Windows, Linux, and macOS now that the host OS-keychain secrets
# backend is cross-platform (CPE-322: Windows Credential Manager / macOS Keychain / Linux
# Secret Service). macOS builds native-arch — the bundled sidecar is single-arch, so this
# channel is not a universal binary (a preview-channel limitation). Linux links libdbus.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish under (e.g. v0.11.0-sidecar)"
        required: true
        type: string

# Needed so the workflow can create the GitHub Release.
permissions:
  contents: write

jobs:
  release-sidecar:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            overlay: windows
          - platform: ubuntu-latest
            overlay: unix
          - platform: macos-latest
            overlay: unix
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          # Cache the app target and the standalone sidecar target (separate crate,
          # not in the app workspace).
          workspaces: |
            ./src-tauri -> target
            ./sidecar/ai-console -> target
            ./sidecar/agent-board -> target
            ./sidecar/repos -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            pkg-config

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      # The bundle overlay references the built sidecar binary as a resource, so it must
      # exist before tauri-action packages the app. Native-arch per runner.
      - name: Build the AI Console sidecar
        working-directory: sidecar/ai-console
        run: cargo build --release

      # The Agent Board sidecar (CPE-854) — bundled next to the AI Console; the overlays reference its
      # release binary + manifest, so it must be built before tauri-action packages the app.
      - name: Build the Agent Board sidecar
        working-directory: sidecar/agent-board
        run: cargo build --release

      # The Repositories sidecar (CPE-863) — bundled alongside the others so it isn't a missing binary;
      # the overlays reference its release binary + manifest, so it must be built before packaging.
      - name: Build the Repositories sidecar
        working-directory: sidecar/repos
        run: cargo build --release

      # Stage a never-executed `.pristine` copy of each sidecar (CPE-867 L2): the overlays bundle it as
      # `sidecars/<id>.pristine`, and the host self-heals a missing/stale exe from it on startup. Because
      # nothing ever runs a `.pristine`, a locked-file install skip (CPE-483) can't leave it stale.
      - name: Stage pristine sidecar copies
        shell: bash
        run: |
          # Pick the built binary by existence, NOT `ls … | head`: under the runner's
          # `bash -e -o pipefail`, `ls existing missing` exits non-zero on the missing candidate,
          # pipefail propagates it, and set -e aborts the step before the copy runs — leaving no
          # `.pristine` and failing the tauri build on the missing resource (CPE-919).
          #
          # Also self-heal a MISSING binary (CPE-920): swatinem/rust-cache prunes each workspace's own
          # final binaries before saving the cache, so on a cache hit `cargo build` can report "Finished"
          # (fingerprint fresh) without relinking the pruned exe. If the expected binary isn't there,
          # force a relink; if it still isn't, fail loudly with a listing instead of silently shipping a
          # broken bundle.
          bin_path() {
            local s="$1"
            if [ -f "sidecar/$s/target/release/$s.exe" ]; then echo "sidecar/$s/target/release/$s.exe";
            elif [ -f "sidecar/$s/target/release/$s" ]; then echo "sidecar/$s/target/release/$s"; fi
          }
          for s in ai-console agent-board repos; do
            bin="$(bin_path "$s")"
            if [ -z "$bin" ]; then
              echo "::warning::sidecar '$s' binary missing after build (likely rust-cache prune) — forcing a relink"
              # Touch the sources so cargo's fingerprint is stale and it MUST rebuild the pruned binary
              # (a plain `cargo build` would just report "Finished" again on a fresh fingerprint).
              find "sidecar/$s/src" -name '*.rs' -exec touch {} +
              ( cd "sidecar/$s" && cargo build --release )
              bin="$(bin_path "$s")"
            fi
            if [ -z "$bin" ]; then
              echo "::error::sidecar '$s' binary still missing after forced rebuild; release/ contents:"
              ls -la "sidecar/$s/target/release/" || true
              exit 1
            fi
            cp "$bin" "sidecar/$s/target/release/$s.pristine"
          done

      - name: Build and publish sidecar-enabled release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Reuse the updater signing secret so bundles sign identically to the main
          # release (the pubkey in tauri.conf.json requires a matching private key).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.tag }}
          releaseName: "Cross-Platform Explorer ${{ inputs.tag }} (sidecar)"
          releaseBody: |
            Build with the sidecar platform + AI Console bundled in — this is the shipping,
            auto-updating channel (the build `/run` installs). Publish the draft to release it;
            once public, installed apps pick it up on their next update check.
          # Created as a draft so it can be reviewed before going public, but NOT a prerelease:
          # GitHub's `/releases/latest/` (the updater endpoint) skips prereleases, so the sidecar
          # channel must be non-prerelease to serve auto-updates (CPE-768).
          releaseDraft: true
          prerelease: false
          # Build with the sidecar feature + the base overlay (product identity) + the per-OS
          # overlay (which bundles the correctly-named sidecar binary + manifest + agent catalog).
          args: --features sidecar-platform --config src-tauri/tauri.sidecar.conf.json --config src-tauri/tauri.sidecar.${{ matrix.overlay }}.conf.json
          # This IS the auto-update channel (CPE-768): emit + upload latest.json. Combined with
          # createUpdaterArtifacts:true in tauri.sidecar.conf.json, the manifest references the
          # correctly-named `…Sidecar…` installers, signed with the shared updater key.
          includeUpdaterJson: true
