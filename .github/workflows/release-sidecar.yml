name: Release (sidecar-enabled)

# Opt-in channel that builds the app WITH the sidecar platform + AI Console bundled in
# (CPE-321/382). Separate from release.yml on purpose: the public release ships the plain,
# sidecar-free explorer by default; this channel is a manual, draft-only preview of the
# sidecar-enabled build while the console matures (security sign-off CPE-304 open).
#
# Run it from the Actions tab ("Run workflow") and provide the release tag, e.g.
# v0.11.0-sidecar. It publishes a DRAFT prerelease you review before making public.
#
# The overlay gives this build a distinct product identity — "Cross-Platform Explorer
# (Sidecar)" / identifier ...crossplatformexplorer.sidecar (CPE-324) — so its installer is
# a separate app that coexists with the plain release instead of colliding on version.
#
# Cross-OS (CPE-382): builds Windows, Linux, and macOS now that the host OS-keychain secrets
# backend is cross-platform (CPE-322: Windows Credential Manager / macOS Keychain / Linux
# Secret Service). macOS builds native-arch — the bundled sidecar is single-arch, so this
# channel is not a universal binary (a preview-channel limitation). Linux links libdbus.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish under (e.g. v0.11.0-sidecar)"
        required: true
        type: string

# Needed so the workflow can create the GitHub Release.
permissions:
  contents: write

jobs:
  release-sidecar:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            overlay: windows
          - platform: ubuntu-latest
            overlay: unix
          - platform: macos-latest
            overlay: unix
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          # Cache the app target and the standalone sidecar target (separate crate,
          # not in the app workspace).
          workspaces: |
            ./src-tauri -> target
            ./sidecar/ai-console -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            pkg-config

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      # The bundle overlay references the built sidecar binary as a resource, so it must
      # exist before tauri-action packages the app. Native-arch per runner.
      - name: Build the AI Console sidecar
        working-directory: sidecar/ai-console
        run: cargo build --release

      - name: Build and publish sidecar-enabled release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Reuse the updater signing secret so bundles sign identically to the main
          # release (the pubkey in tauri.conf.json requires a matching private key).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.tag }}
          releaseName: "Cross-Platform Explorer ${{ inputs.tag }} (sidecar preview)"
          releaseBody: |
            Preview build with the sidecar platform + AI Console bundled in.
            Opt-in / draft channel — not part of the auto-update stream. See the assets below.
          releaseDraft: true
          prerelease: true
          # Build with the sidecar feature + the base overlay (product identity) + the per-OS
          # overlay (which bundles the correctly-named sidecar binary + manifest + agent catalog).
          args: --features sidecar-platform --config src-tauri/tauri.sidecar.conf.json --config src-tauri/tauri.sidecar.${{ matrix.overlay }}.conf.json
          # Keep this channel out of the auto-update manifest (it's a manual preview).
          includeUpdaterJson: false
